name: CI Pipeline

on:
  # Pipeline complet lancé sur push vers main (inclut publication Docker).
  push:
    branches: [main]

  # Sur PR, on valide qualité/test/build mais le job de push reste bloqué par condition.
  pull_request:

jobs:
  # =========================
  # BACKEND
  # =========================
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U infoclimat"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: test_db
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 #history complète nécessaire pour certains outils de test et couverture

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install .[dev]

      - name: Wait for database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U infoclimat; do
            sleep 2
          done

      - name: Run migrations
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests with report
        run:
          | # Génère un rapport JUnit XML pour intégration avec GitHub Actions.
          cd backend
          pytest --junitxml=report.xml

      - name: Upload backend test report
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/report.xml

      - name: Lint check with Ruff
        run: |
          cd backend
          ruff check . --fix

  # =========================
  # FRONTEND
  # =========================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Build
        run: |
          cd frontend
          npm run build

  # =========================
  # DOCKER + SECURITY
  # =========================
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login DHI registry
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker images
        run: docker compose -f docker-compose.test.yml build

      - name: Run Trivy scan # check vuln sur filesystem (code source + images montées)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json

      - name: Generate Trivy SBOM # génère un SBOM (dépendances/versions) pour analyse de la composition des images et code source.
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: trivy-sbom.json

      - name: Upload Trivy report, SBOM and VEX # uploade les rapports de vulnérabilité, SBOM et VEX en tant qu'artifacts pour analyse post-run.
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: |
            trivy-report.json
            trivy-sbom.json
            vex.json

  # =========================
  # PUSH DOCKER
  # =========================
  push:
    runs-on: ubuntu-latest
    needs: docker

    # Publication uniquement sur main.
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve base images
        id: resolve-images
        shell: bash
        env:
          BACKEND_BASE_IMAGE_RAW: ${{ vars.BACKEND_BASE_IMAGE }}
          FRONTEND_BUILD_IMAGE_RAW: ${{ vars.FRONTEND_BUILD_IMAGE }}
          FRONTEND_RUNTIME_IMAGE_RAW: ${{ vars.FRONTEND_RUNTIME_IMAGE }}
        run: |
          set -euo pipefail

          backend_base_image="${BACKEND_BASE_IMAGE_RAW:-python:3.12-slim-bookworm}"
          frontend_build_image="${FRONTEND_BUILD_IMAGE_RAW:-node:24-alpine}"
          frontend_runtime_image="${FRONTEND_RUNTIME_IMAGE_RAW:-node:24-alpine}"

          echo "backend_base_image=$backend_base_image" >> "$GITHUB_OUTPUT"
          echo "frontend_build_image=$frontend_build_image" >> "$GITHUB_OUTPUT"
          echo "frontend_runtime_image=$frontend_runtime_image" >> "$GITHUB_OUTPUT"

      - name: Display image resolution
        shell: bash
        run: |
          echo "Backend base image: ${{ steps.resolve-images.outputs.backend_base_image }}"
          echo "Frontend build image: ${{ steps.resolve-images.outputs.frontend_build_image }}"
          echo "Frontend runtime image: ${{ steps.resolve-images.outputs.frontend_runtime_image }}"

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login DHI registry
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: |
            BACKEND_BASE_IMAGE=${{ steps.resolve-images.outputs.backend_base_image }}
          tags: |
            nyons/14-valorisationdonneemeteo-backend:latest
            nyons/14-valorisationdonneemeteo-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            FRONTEND_BUILD_IMAGE=${{ steps.resolve-images.outputs.frontend_build_image }}
            FRONTEND_RUNTIME_IMAGE=${{ steps.resolve-images.outputs.frontend_runtime_image }}
          tags: |
            nyons/14-valorisationdonneemeteo-frontend:latest
            nyons/14-valorisationdonneemeteo-frontend:${{ github.sha }}
